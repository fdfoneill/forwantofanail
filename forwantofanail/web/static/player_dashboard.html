<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>For Want of a Nail - Player Dashboard</title>
  <style>
    :root {
      --bg: #f5f2eb;
      --panel: #fffaf1;
      --ink: #1b1a18;
      --muted: #6a645b;
      --line: #d7cfc2;
      --accent: #145f66;
      --water: #4d85c8;
      --forest: #2f6f3f;
      --open-ground: #b8d98e;
      --rainforest: #175f34;
      --mountain: #8f8a80;
      --desert: #d6b978;
      --river: #5a9bd6;
      --unknown: #c9c6be;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 85% 8%, #d9ecef 0%, transparent 45%),
        radial-gradient(circle at 4% 95%, #f4ddc8 0%, transparent 45%),
        var(--bg);
      min-height: 100vh;
      padding: 20px;
    }
    h1 {
      margin: 0 0 14px;
      font-size: 28px;
      letter-spacing: 0.02em;
    }
    .shell {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
      align-items: start;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.05);
    }
    .controls {
      padding: 14px;
    }
    .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    select, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      padding: 10px 12px;
      font-size: 14px;
      margin-bottom: 10px;
      background: #fff;
    }
    button {
      background: linear-gradient(135deg, var(--accent), #1b7d86);
      color: #fff;
      border-color: transparent;
      font-weight: 600;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }
    .status.error { color: #a22a2a; }
    .meta {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .message-tools {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    .orders-tools {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    .orders-note {
      font-size: 12px;
      color: var(--muted);
      margin: 4px 0 8px;
      line-height: 1.4;
    }
    .staged-list {
      margin: 8px 0 0;
      padding: 0;
      list-style: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      max-height: 170px;
      overflow: auto;
    }
    .staged-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 6px 8px;
      border-bottom: 1px solid #eee7dd;
      font-size: 12px;
    }
    .staged-item:last-child { border-bottom: none; }
    .staged-remove {
      width: auto;
      margin: 0;
      padding: 4px 8px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }
    .staged-empty {
      padding: 8px 10px;
      color: var(--muted);
      font-size: 12px;
    }
    .message-box {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 10px;
    }
    .message-box textarea {
      width: 100%;
      min-height: 92px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      resize: vertical;
      font-family: inherit;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .message-box[hidden] { display: none; }
    .inbox-list {
      margin: 10px 0 0;
      padding: 0;
      list-style: none;
      max-height: 190px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .inbox-item {
      border-bottom: 1px solid #eee7dd;
    }
    .inbox-item:last-child { border-bottom: none; }
    .inbox-btn {
      width: 100%;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--ink);
      text-align: left;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
    }
    .inbox-btn.unread {
      font-weight: 700;
      background: #f4f8ff;
    }
    .message-read {
      margin-top: 8px;
      font-size: 12px;
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 8px 10px;
      min-height: 88px;
      white-space: pre-wrap;
    }
    .map-panel {
      position: relative;
      min-height: 74vh;
      overflow: hidden;
    }
    #mapCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .legend {
      position: absolute;
      right: 12px;
      top: 12px;
      background: rgba(255, 250, 241, 0.92);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font-size: 12px;
      color: var(--muted);
      max-width: 180px;
    }
    .hover-card {
      position: absolute;
      display: none;
      min-width: 280px;
      max-width: 380px;
      background: rgba(255, 250, 241, 0.97);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.16);
      padding: 10px;
      z-index: 4;
      pointer-events: auto;
    }
    .hover-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .hover-title.stronghold {
      font-weight: 700;
      color: var(--ink);
    }
    .hover-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      align-items: center;
    }
    .hover-action {
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #1b7d86);
      cursor: pointer;
      white-space: nowrap;
    }
    .hover-meta {
      margin-top: 8px;
      font-size: 12px;
      color: var(--ink);
      line-height: 1.5;
    }
    .hover-meta .k {
      color: var(--muted);
      margin-right: 6px;
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 3px 0;
    }
    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      border: 1px solid rgba(0, 0, 0, 0.2);
      flex: 0 0 12px;
    }
    .cell-poly {
      stroke: transparent;
      stroke-width: 0.9;
      transition: stroke 120ms ease, stroke-width 120ms ease;
    }
    .cell-poly:hover {
      stroke: #3f3b34;
      stroke-width: 1.15;
    }
    .cell-poly.center-cell,
    .cell-poly.center-cell:hover {
      stroke: #ffffff;
      stroke-width: 2.6;
    }
    @media (max-width: 980px) {
      .shell { grid-template-columns: 1fr; }
      .map-panel { min-height: 62vh; }
    }
  </style>
</head>
<body>
  <h1>Player Environs Dashboard</h1>

  <div class="shell">
    <section class="panel controls">
      <div class="label">Commander</div>
      <select id="commanderSelect">
        <option value="">Select commander...</option>
      </select>
      <div class="status" id="statusLine"></div>

      <div class="meta">
        <div><strong>Time:</strong> <span id="timeText">-</span></div>
        <div><strong>Center Cell:</strong> <span id="centerText">-</span></div>
        <div><strong>Radius:</strong> <span id="radiusText">-</span></div>
        <div><strong>Visible Cells:</strong> <span id="cellCountText">0</span></div>
        <div style="margin-top:10px;"><strong>Supply</strong></div>
        <div><strong>Current:</strong> <span id="supplyCurrentText">-</span></div>
        <div><strong>Capacity:</strong> <span id="supplyCapacityText">-</span></div>
        <div><strong>Daily Use:</strong> <span id="supplyDailyText">-</span></div>
        <div><strong>Days Remaining:</strong> <span id="supplyDaysText">-</span></div>
      </div>

      <div class="orders-tools">
        <div class="label">Orders</div>
        <select id="orderModeSelect">
          <option value="march">March</option>
          <option value="forage">Forage</option>
        </select>
        <div class="orders-note" id="ordersNote">Plan up to 4 march cells this day.</div>
        <button id="submitOrdersBtn" type="button">Submit Orders</button>
        <ul id="stagedPathList" class="staged-list"></ul>
      </div>

      <div class="message-tools">
        <button id="composeToggleBtn" type="button">Send Letter</button>
        <div class="message-box" id="composeBox" hidden>
          <div class="label" style="margin-bottom:6px;">Recipient</div>
          <select id="recipientSelect"></select>
          <textarea id="letterInput" placeholder="Write your letter..."></textarea>
          <button id="sendLetterBtn" type="button">Send</button>
        </div>

        <div class="label" style="margin-top:10px;">Received Letters</div>
        <ul id="inboxList" class="inbox-list"></ul>
        <div id="messageRead" class="message-read">Select a letter to read.</div>
      </div>
    </section>

    <section class="panel map-panel" id="mapPanel">
      <svg id="mapCanvas" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="legend" id="legend"></div>
      <div class="hover-card" id="hoverCard">
        <div class="hover-title" id="hoverTitle">Cell Actions</div>
        <div class="hover-row">
          <button id="queueMoveBtn" class="hover-action" type="button">Stage Move</button>
        </div>
        <div class="hover-meta" id="hoverMeta"></div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/h3-js@4.1.0/dist/h3-js.umd.js"></script>
  <script>
    const state = {
      token: null,
      selectedCommander: null,
      view: null,
      projectedCells: [],
      borderRoadNeighbors: new Set(),
      mapWidth: 1000,
      mapHeight: 700,
      pinnedH3: null,
      hoverH3: null,
      correspondents: [],
      inbox: [],
      openMessageId: null,
      orderMode: "march",
      stagedPath: [],
    };

    const TERRAIN_COLORS = {
      "open ground": "var(--open-ground)",
      "forest": "var(--forest)",
      "rainforest": "var(--rainforest)",
      "mountainous": "var(--mountain)",
      "desert": "var(--desert)",
      "river": "var(--river)",
      "open water": "var(--water)",
    };

    const TERRAIN_ORDER = ["open ground", "forest", "rainforest", "mountainous", "desert", "river", "open water"];
    const STRONGHOLD_ICON_BY_TYPE = {
      city: "/static/icons/strongholds/city.svg",
      town: "/static/icons/strongholds/town.svg",
      fortress: "/static/icons/strongholds/fortress.svg",
    };
    const OTHER_ARMY_ICON = "/static/icons/armies/other_army.svg";
    const STRONGHOLD_ICON_SCALE_BY_TYPE = {
      city: 1.06,
      town: 0.96,
      fortress: 0.88,
    };
    const STRONGHOLD_ICON_Y_OFFSET_BY_TYPE = {
      city: -0.07,
      town: 0.0,
      fortress: 0.0,
    };
    const WATCH_NAME_BY_INDEX = {
      0: "Night",
      1: "Matin",
      2: "Prime",
      3: "Midday",
      4: "Vesper",
    };

    const els = {
      commanderSelect: document.getElementById("commanderSelect"),
      statusLine: document.getElementById("statusLine"),
      timeText: document.getElementById("timeText"),
      centerText: document.getElementById("centerText"),
      radiusText: document.getElementById("radiusText"),
      cellCountText: document.getElementById("cellCountText"),
      supplyCurrentText: document.getElementById("supplyCurrentText"),
      supplyCapacityText: document.getElementById("supplyCapacityText"),
      supplyDailyText: document.getElementById("supplyDailyText"),
      supplyDaysText: document.getElementById("supplyDaysText"),
      orderModeSelect: document.getElementById("orderModeSelect"),
      ordersNote: document.getElementById("ordersNote"),
      submitOrdersBtn: document.getElementById("submitOrdersBtn"),
      stagedPathList: document.getElementById("stagedPathList"),
      composeToggleBtn: document.getElementById("composeToggleBtn"),
      composeBox: document.getElementById("composeBox"),
      recipientSelect: document.getElementById("recipientSelect"),
      letterInput: document.getElementById("letterInput"),
      sendLetterBtn: document.getElementById("sendLetterBtn"),
      inboxList: document.getElementById("inboxList"),
      messageRead: document.getElementById("messageRead"),
      mapCanvas: document.getElementById("mapCanvas"),
      mapPanel: document.getElementById("mapPanel"),
      legend: document.getElementById("legend"),
      hoverCard: document.getElementById("hoverCard"),
      hoverTitle: document.getElementById("hoverTitle"),
      queueMoveBtn: document.getElementById("queueMoveBtn"),
      hoverMeta: document.getElementById("hoverMeta"),
    };

    function setStatus(message, isError = false) {
      els.statusLine.textContent = message || "";
      els.statusLine.classList.toggle("error", !!isError);
    }

    function watchDisplayName(value) {
      const index = Number(value);
      if (!Number.isFinite(index)) {
        return "Unknown Watch";
      }
      const base = WATCH_NAME_BY_INDEX[index] || "Unknown";
      return `${base} Watch`;
    }

    function armyStatusText(view) {
      const armyName = String(view?.army?.name || "Army").trim() || "Army";
      const watch = Number(view?.time?.watch);
      if (watch === 0) {
        return `${armyName}: Encamped`;
      }
      const kind = String(view?.current_action?.kind || "").trim().toLowerCase();
      if (kind === "move") {
        return `${armyName}: Marching`;
      }
      if (kind === "forage") {
        return `${armyName}: Foraging`;
      }
      return `${armyName}: Holding`;
    }

    function currentWatchIndex() {
      return Number(state.view?.time?.watch);
    }

    function maxMarchSteps() {
      const watch = currentWatchIndex();
      if (!Number.isFinite(watch)) {
        return 0;
      }
      if (watch <= 0) {
        return 4;
      }
      return Math.max(0, 4 - watch);
    }

    function isNightWatch() {
      return currentWatchIndex() === 0;
    }

    function renderStagedPathList() {
      if (!state.stagedPath.length) {
        els.stagedPathList.innerHTML = "<li class=\"staged-empty\">No staged march cells.</li>";
        return;
      }
      const rows = state.stagedPath.map((h3Index, idx) => (
        `<li class="staged-item">` +
        `<span>${idx + 1}. ${h3Index}</span>` +
        `<button class="staged-remove" data-stage-idx="${idx}" type="button">Remove</button>` +
        `</li>`
      ));
      els.stagedPathList.innerHTML = rows.join("");
      els.stagedPathList.querySelectorAll("button[data-stage-idx]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const idx = Number(btn.dataset.stageIdx);
          if (!Number.isFinite(idx) || idx < 0 || idx >= state.stagedPath.length) {
            return;
          }
          state.stagedPath.splice(idx, 1);
          renderStagedPathList();
          renderMap();
        });
      });
    }

    function renderOrdersPanel() {
      const maxSteps = maxMarchSteps();
      const isMarch = state.orderMode === "march";
      els.orderModeSelect.value = state.orderMode;
      els.queueMoveBtn.disabled = !isMarch;
      if (isMarch) {
        els.ordersNote.textContent = `March orders: up to ${maxSteps} staged cells this day.`;
      } else if (isNightWatch()) {
        els.ordersNote.textContent = "Forage available this Night Watch. Submitting will replace queued actions.";
      } else {
        els.ordersNote.textContent = "Forage unavailable outside Night Watch.";
      }
      const forageOption = els.orderModeSelect.querySelector("option[value=\"forage\"]");
      if (forageOption) {
        forageOption.disabled = !isNightWatch();
      }
      if (state.orderMode === "forage" && !isNightWatch()) {
        state.orderMode = "march";
        els.orderModeSelect.value = "march";
      }
      if (state.stagedPath.length > maxSteps) {
        state.stagedPath = state.stagedPath.slice(0, maxSteps);
      }
      renderStagedPathList();
    }

    function canStageMove(targetH3) {
      if (!state.view || !targetH3) {
        return { ok: false, reason: "No active view loaded." };
      }
      if (state.orderMode !== "march") {
        return { ok: false, reason: "Set orders to March to stage movement." };
      }
      const maxSteps = maxMarchSteps();
      if (maxSteps < 1) {
        return { ok: false, reason: "No march watches remain this day." };
      }
      if (state.stagedPath.length >= maxSteps) {
        return { ok: false, reason: `You can stage at most ${maxSteps} cells right now.` };
      }
      const visible = new Set((state.view?.environs?.cells || []).map((c) => c.h3));
      if (!visible.has(targetH3)) {
        return { ok: false, reason: "Cell is outside your current view." };
      }
      const last = state.stagedPath.length ? state.stagedPath[state.stagedPath.length - 1] : state.view.environs.center_h3;
      if (!areNeighborCells(last, targetH3)) {
        return { ok: false, reason: "Each staged cell must be adjacent to the previous step." };
      }
      return { ok: true, reason: "" };
    }

    function terrainKey(value) {
      return String(value || "unknown").trim().toLowerCase();
    }

    function terrainColor(terrainType) {
      return TERRAIN_COLORS[terrainKey(terrainType)] || "var(--unknown)";
    }

    function parseBoundary(boundary) {
      return boundary.map((point) => {
        if (Array.isArray(point)) {
          return { lat: point[0], lng: point[1] };
        }
        return { lat: point.lat, lng: point.lng };
      });
    }

    function cellBoundary(h3Index) {
      if (window.h3.cellToBoundary) {
        return parseBoundary(window.h3.cellToBoundary(h3Index));
      }
      if (window.h3.h3ToGeoBoundary) {
        return parseBoundary(window.h3.h3ToGeoBoundary(h3Index, true));
      }
      throw new Error("h3 boundary function unavailable");
    }

    function cellCenter(h3Index) {
      if (window.h3.cellToLatLng) {
        const [lat, lng] = window.h3.cellToLatLng(h3Index);
        return { lat, lng };
      }
      if (window.h3.h3ToGeo) {
        const [lat, lng] = window.h3.h3ToGeo(h3Index);
        return { lat, lng };
      }
      throw new Error("h3 center function unavailable");
    }

    function areNeighborCells(a, b) {
      if (window.h3.areNeighborCells) {
        return window.h3.areNeighborCells(a, b);
      }
      if (window.h3.h3IndexesAreNeighbors) {
        return window.h3.h3IndexesAreNeighbors(a, b);
      }
      return false;
    }

    function neighborCells(h3Index) {
      if (window.h3.gridDisk) {
        const disk = window.h3.gridDisk(h3Index, 1);
        return disk.filter((value) => value !== h3Index);
      }
      return [];
    }

    async function api(path, options = {}, useAuth = false) {
      const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
      if (useAuth && state.token) {
        headers["Authorization"] = `Bearer ${state.token}`;
      }
      const response = await fetch(path, { ...options, headers });
      const contentType = response.headers.get("content-type") || "";
      const data = contentType.includes("application/json") ? await response.json() : await response.text();
      if (!response.ok) {
        throw new Error(typeof data === "object" ? JSON.stringify(data) : data);
      }
      return data;
    }

    async function loadCommanders() {
      const commanders = await api("/v1/commanders");
      const options = ["<option value=''>Select commander...</option>"];
      for (const cmd of commanders) {
        const label = cmd.display_name || cmd.name;
        options.push(`<option value="${cmd.name}">${label}</option>`);
      }
      els.commanderSelect.innerHTML = options.join("");
    }

    async function loginCommander(commanderName) {
      const payload = await api("/v1/auth/login", {
        method: "POST",
        body: JSON.stringify({ commander_name: commanderName }),
      });
      state.token = payload.token;
      state.selectedCommander = payload.commander.name;
    }

    function renderCorrespondents() {
      if (!state.correspondents.length) {
        els.recipientSelect.innerHTML = "<option value=\"\">No correspondents</option>";
        return;
      }
      const rows = state.correspondents.map(
        (c) => `<option value="${c.id}">${c.display_name || c.name}</option>`
      );
      els.recipientSelect.innerHTML = rows.join("");
    }

    async function refreshCorrespondents() {
      if (!state.token) {
        state.correspondents = [];
        renderCorrespondents();
        return;
      }
      state.correspondents = await api("/v1/correspondents", {}, true);
      renderCorrespondents();
    }

    function renderInbox() {
      if (!state.inbox.length) {
        els.inboxList.innerHTML = "<li class=\"inbox-item\"><div class=\"inbox-btn\">No received letters yet.</div></li>";
        return;
      }
      const rows = state.inbox.map((msg) => {
        const unreadClass = msg.is_read ? "" : " unread";
        const marker = msg.is_read ? "" : "[UNREAD] ";
        const sentDay = Number(msg?.sent_watch?.day);
        const dayText = Number.isFinite(sentDay) ? `, day ${sentDay}` : "";
        return (
          `<li class="inbox-item">` +
          `<button class="inbox-btn${unreadClass}" data-msg-id="${msg.id}" type="button">` +
          `${marker}${msg.from.name}${dayText}` +
          `</button>` +
          `</li>`
        );
      });
      els.inboxList.innerHTML = rows.join("");
      els.inboxList.querySelectorAll(".inbox-btn[data-msg-id]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const messageId = btn.dataset.msgId;
          try {
            const message = await api(`/v1/me/messages/${messageId}`, {}, true);
            state.openMessageId = message.id;
            const sentWatchName = watchDisplayName(message?.sent_watch?.watch);
            const deliveredWatchName = watchDisplayName(message?.delivered_watch?.watch);
            els.messageRead.textContent =
              `From: ${message.from.name}\n` +
              `Sent: day ${message.sent_watch.day}, ${sentWatchName}\n` +
              `Delivered: day ${message.delivered_watch.day}, ${deliveredWatchName}\n\n` +
              `${message.content}`;
            await refreshInbox();
          } catch (err) {
            setStatus(`Read failed: ${err.message}`, true);
          }
        });
      });
    }

    async function refreshInbox() {
      if (!state.token) {
        state.inbox = [];
        state.openMessageId = null;
        els.messageRead.textContent = "Select a letter to read.";
        renderInbox();
        return;
      }
      state.inbox = await api("/v1/me/messages", {}, true);
      renderInbox();
    }

    function renderLegend() {
      const rows = ["<div><strong>Terrain</strong></div>"];
      for (const key of TERRAIN_ORDER) {
        rows.push(`<div class=\"legend-row\"><span class=\"swatch\" style=\"background:${terrainColor(key)}\"></span>${key}</div>`);
      }
      rows.push('<div style="margin-top:6px;">Roads: brown links between adjacent road cells</div>');
      rows.push('<div>Strongholds: icon by type</div>');
      els.legend.innerHTML = rows.join("");
    }

    function projectCells(cells, width, height) {
      const raw = [];
      let minX = Infinity;
      let maxX = -Infinity;
      let minY = Infinity;
      let maxY = -Infinity;

      for (const cell of cells) {
        const center = cellCenter(cell.h3);
        const boundary = cellBoundary(cell.h3);
        const centerX = center.lng * Math.cos((center.lat * Math.PI) / 180);
        const centerY = -center.lat;

        const poly = boundary.map((p) => {
          const x = p.lng * Math.cos((p.lat * Math.PI) / 180);
          const y = -p.lat;
          minX = Math.min(minX, x);
          maxX = Math.max(maxX, x);
          minY = Math.min(minY, y);
          maxY = Math.max(maxY, y);
          return { x, y };
        });

        raw.push({ cell, centerLat: center.lat, centerLng: center.lng, centerX, centerY, poly });
      }

      const pad = 36;
      const dx = Math.max(maxX - minX, 1e-6);
      const dy = Math.max(maxY - minY, 1e-6);
      const scale = Math.min((width - pad * 2) / dx, (height - pad * 2) / dy);
      const toScreen = (lat, lng) => ({
        x: pad + ((lng * Math.cos((lat * Math.PI) / 180)) - minX) * scale,
        y: pad + ((-lat) - minY) * scale,
      });

      const projected = raw.map((item) => ({
        cell: item.cell,
        center: toScreen(item.centerLat, item.centerLng),
        poly: item.poly.map((p) => ({
          x: pad + (p.x - minX) * scale,
          y: pad + (p.y - minY) * scale,
        })),
        scale,
      }));
      return { projected, toScreen };
    }

    function rayPolygonBoundaryPoint(center, dir, polygon) {
      const eps = 1e-6;
      let bestT = Infinity;
      let bestPoint = null;

      const cross = (ax, ay, bx, by) => ax * by - ay * bx;

      for (let i = 0; i < polygon.length; i += 1) {
        const a = polygon[i];
        const b = polygon[(i + 1) % polygon.length];
        const sx = b.x - a.x;
        const sy = b.y - a.y;
        const qpx = a.x - center.x;
        const qpy = a.y - center.y;

        const denom = cross(dir.x, dir.y, sx, sy);
        if (Math.abs(denom) < eps) {
          continue;
        }
        const t = cross(qpx, qpy, sx, sy) / denom;
        const u = cross(qpx, qpy, dir.x, dir.y) / denom;
        if (t > eps && u >= -eps && u <= 1 + eps && t < bestT) {
          bestT = t;
          bestPoint = { x: center.x + dir.x * t, y: center.y + dir.y * t };
        }
      }

      return bestPoint;
    }

    function renderMap() {
      const view = state.view;
      if (!view || !view.environs || !Array.isArray(view.environs.cells)) {
        els.mapCanvas.innerHTML = "";
        return;
      }
      const cells = view.environs.cells;
      const width = state.mapWidth;
      const height = state.mapHeight;
      els.mapCanvas.setAttribute("viewBox", `0 0 ${width} ${height}`);

      const projection = projectCells(cells, width, height);
      const projected = projection.projected;
      state.projectedCells = projected;

      const polygons = [];
      let centerPolygon = "";
      const stagedOverlays = [];
      const stagedLabels = [];
      const roadLines = [];
      const strongholdIcons = [];
      const otherArmyIcons = [];
      const centerByH3 = new Map();
      const stagedIndexByH3 = new Map(state.stagedPath.map((h3Index, idx) => [h3Index, idx + 1]));

      for (const item of projected) {
        centerByH3.set(item.cell.h3, item.center);
      }
      const polyByH3 = new Map();
      for (const item of projected) {
        polyByH3.set(item.cell.h3, item.poly);
      }

      const roadCells = cells.filter((cell) => cell.has_road).map((cell) => cell.h3);
      const uniqueRoadPairs = new Set();
      for (let i = 0; i < roadCells.length; i += 1) {
        for (let j = i + 1; j < roadCells.length; j += 1) {
          const a = roadCells[i];
          const b = roadCells[j];
          if (!areNeighborCells(a, b)) {
            continue;
          }
          const pair = a < b ? `${a}|${b}` : `${b}|${a}`;
          uniqueRoadPairs.add(pair);
        }
      }
      for (const pair of uniqueRoadPairs) {
        const [a, b] = pair.split("|");
        const c1 = centerByH3.get(a);
        const c2 = centerByH3.get(b);
        if (!c1 || !c2) {
          continue;
        }
        roadLines.push(
          `<line x1="${c1.x.toFixed(1)}" y1="${c1.y.toFixed(1)}" x2="${c2.x.toFixed(1)}" y2="${c2.y.toFixed(1)}" stroke="#8b5a2b" stroke-width="3.2" stroke-linecap="round" opacity="0.9" pointer-events="none" />`
        );
      }

      // Border stubs: visible road cell -> off-environs adjacent road cell.
      const visibleSet = new Set(cells.map((cell) => cell.h3));
      const borderRoadSet = state.borderRoadNeighbors || new Set();
      for (const roadCell of roadCells) {
        const c1 = centerByH3.get(roadCell);
        const originPoly = polyByH3.get(roadCell);
        if (!c1) {
          continue;
        }
        if (!originPoly || originPoly.length < 3) {
          continue;
        }
        for (const neighbor of neighborCells(roadCell)) {
          if (visibleSet.has(neighbor)) {
            continue;
          }
          if (!borderRoadSet.has(neighbor)) {
            continue;
          }
          const geo = cellCenter(neighbor);
          const c2 = projection.toScreen(geo.lat, geo.lng);
          const dx = c2.x - c1.x;
          const dy = c2.y - c1.y;
          const length = Math.hypot(dx, dy);
          if (length < 1e-6) {
            continue;
          }
          const dir = { x: dx / length, y: dy / length };
          const edgePoint = rayPolygonBoundaryPoint(c1, dir, originPoly);
          if (!edgePoint) {
            continue;
          }
          roadLines.push(
            `<line x1="${c1.x.toFixed(1)}" y1="${c1.y.toFixed(1)}" x2="${edgePoint.x.toFixed(1)}" y2="${edgePoint.y.toFixed(1)}" stroke="#8b5a2b" stroke-width="3.2" stroke-linecap="round" opacity="0.9" pointer-events="none" />`
          );
        }
      }

      for (const item of projected) {
        const points = item.poly.map((p) => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
        const isCenter = item.cell.h3 === view.environs.center_h3;
        const polyClass = isCenter ? "cell-poly center-cell" : "cell-poly";
        const polygon = `<polygon class="${polyClass}" data-h3="${item.cell.h3}" points="${points}" fill="${terrainColor(item.cell.terrain_type)}" opacity="0.94" />`;
        if (isCenter) {
          centerPolygon = polygon;
        } else {
          polygons.push(polygon);
        }

        if (item.cell.stronghold && item.cell.stronghold.name) {
          const strongholdType = String(item.cell.stronghold.type || "").trim().toLowerCase();
          const iconHref = STRONGHOLD_ICON_BY_TYPE[strongholdType];
          if (iconHref) {
            const xs = item.poly.map((p) => p.x);
            const ys = item.poly.map((p) => p.y);
            const cellWidth = Math.max(...xs) - Math.min(...xs);
            const cellHeight = Math.max(...ys) - Math.min(...ys);
            const baseScale = 0.82;
            const typeScale = STRONGHOLD_ICON_SCALE_BY_TYPE[strongholdType] || 1.0;
            const iconSize = Math.max(20, Math.min(cellWidth, cellHeight) * baseScale * typeScale);
            const iconX = item.center.x - iconSize / 2;
            const yOffsetFactor = STRONGHOLD_ICON_Y_OFFSET_BY_TYPE[strongholdType] || 0.0;
            const iconY = item.center.y - iconSize / 2 + iconSize * yOffsetFactor;
            strongholdIcons.push(
              `<image href="${iconHref}" x="${iconX.toFixed(1)}" y="${iconY.toFixed(1)}" width="${iconSize.toFixed(1)}" height="${iconSize.toFixed(1)}" preserveAspectRatio="xMidYMid meet" pointer-events="none" />`
            );
          }
        }

        const otherArmies = Array.isArray(item.cell.other_armies) ? item.cell.other_armies : [];
        if (otherArmies.length > 0) {
          const xs = item.poly.map((p) => p.x);
          const ys = item.poly.map((p) => p.y);
          const cellWidth = Math.max(...xs) - Math.min(...xs);
          const cellHeight = Math.max(...ys) - Math.min(...ys);
          const iconSize = Math.max(14, Math.min(cellWidth, cellHeight) * 0.34);
          const iconX = item.center.x - iconSize / 2;
          const iconY = item.center.y - iconSize / 2;
          otherArmyIcons.push(
            `<image href="${OTHER_ARMY_ICON}" x="${iconX.toFixed(1)}" y="${iconY.toFixed(1)}" width="${iconSize.toFixed(1)}" height="${iconSize.toFixed(1)}" preserveAspectRatio="xMidYMid meet" pointer-events="none" />`
          );
        }

        const stagedNumber = stagedIndexByH3.get(item.cell.h3);
        if (stagedNumber) {
          const stagedPoints = item.poly.map((p) => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
          stagedOverlays.push(
            `<polygon points="${stagedPoints}" fill="none" stroke="#d7891f" stroke-width="2.4" stroke-linejoin="round" opacity="0.95" pointer-events="none" />`
          );
          stagedLabels.push(
            `<text x="${item.center.x.toFixed(1)}" y="${(item.center.y + 4).toFixed(1)}" text-anchor="middle" font-size="15" font-weight="700" fill="#2f2212" stroke="#fdf6e8" stroke-width="2.2" paint-order="stroke" pointer-events="none">${stagedNumber}</text>`
          );
        }
      }

      if (centerPolygon) {
        polygons.push(centerPolygon);
      }
      els.mapCanvas.innerHTML =
        `<g>${polygons.join("")}</g>` +
        `<g>${roadLines.join("")}</g>` +
        `<g>${strongholdIcons.join("")}</g>` +
        `<g>${otherArmyIcons.join("")}</g>` +
        `<g>${stagedOverlays.join("")}</g>` +
        `<g>${stagedLabels.join("")}</g>`;
      bindHoverHandlers();
    }

    function hideHoverCard() {
      state.hoverH3 = null;
      els.hoverCard.style.display = "none";
    }

    function positionHoverCard(clientX, clientY) {
      const panelRect = els.mapPanel.getBoundingClientRect();
      const cardRect = els.hoverCard.getBoundingClientRect();
      const margin = 12;
      let x = clientX - panelRect.left + 14;
      let y = clientY - panelRect.top + 14;
      if (x + cardRect.width + margin > panelRect.width) {
        x = panelRect.width - cardRect.width - margin;
      }
      if (y + cardRect.height + margin > panelRect.height) {
        y = panelRect.height - cardRect.height - margin;
      }
      x = Math.max(margin, x);
      y = Math.max(margin, y);
      els.hoverCard.style.left = `${x}px`;
      els.hoverCard.style.top = `${y}px`;
    }

    function showHoverCard(h3Index, clientX, clientY) {
      state.hoverH3 = h3Index;
      const cell = state.view?.environs?.cells?.find((c) => c.h3 === h3Index);
      if (cell) {
        const terrain = cell.terrain_type || "unknown";
        const settlementText = cell.settlement == null ? "0" : String(cell.settlement);
        const foragedText = cell.foraged_this_season ? "yes" : "no";
        const hasStronghold = !!(cell.stronghold && cell.stronghold.name);
        let strongholdTypeText = "none";
        let strongholdFactionText = "none";
        if (cell.stronghold && cell.stronghold.type) {
          strongholdTypeText = String(cell.stronghold.type);
        }
        if (hasStronghold && cell.stronghold && cell.stronghold.faction) {
          strongholdFactionText = String(cell.stronghold.faction);
        } else if (!hasStronghold && cell.region_control) {
          strongholdFactionText = String(cell.region_control);
        }
        if (hasStronghold) {
          els.hoverTitle.textContent = cell.stronghold.name;
          els.hoverTitle.classList.add("stronghold");
        } else if (cell.has_road) {
          els.hoverTitle.textContent = "Road";
          els.hoverTitle.classList.remove("stronghold");
        } else {
          els.hoverTitle.textContent = terrain;
          els.hoverTitle.classList.remove("stronghold");
        }
        els.hoverMeta.innerHTML =
          `<div><span class=\"k\">Terrain:</span>${terrain}</div>` +
          `<div><span class=\"k\">Stronghold Type:</span>${strongholdTypeText}</div>` +
          `<div><span class=\"k\">Faction:</span>${strongholdFactionText}</div>` +
          `<div><span class=\"k\">Settlement:</span>${settlementText}</div>` +
          `<div><span class=\"k\">Foraged This Season:</span>${foragedText}</div>`;
      } else {
        els.hoverTitle.textContent = "Cell";
        els.hoverTitle.classList.remove("stronghold");
        els.hoverMeta.innerHTML = "";
      }
      els.hoverCard.style.display = "block";
      positionHoverCard(clientX, clientY);
    }

    function pinCard(h3Index, clientX, clientY) {
      state.pinnedH3 = h3Index;
      showHoverCard(h3Index, clientX, clientY);
      setStatus(`Pinned ${h3Index}. Click map background to unpin.`);
    }

    function clearPin() {
      state.pinnedH3 = null;
      hideHoverCard();
    }

    function bindHoverHandlers() {
      const polys = els.mapCanvas.querySelectorAll(".cell-poly");
      polys.forEach((poly) => {
        poly.addEventListener("mouseenter", (event) => {
          if (state.pinnedH3) {
            return;
          }
          showHoverCard(poly.dataset.h3 || "", event.clientX, event.clientY);
        });
        poly.addEventListener("mousemove", (event) => {
          if (state.pinnedH3) {
            return;
          }
          if (els.hoverCard.style.display === "block") {
            positionHoverCard(event.clientX, event.clientY);
          }
        });
        poly.addEventListener("mouseleave", () => {
          if (!state.pinnedH3) {
            hideHoverCard();
          }
        });
        poly.addEventListener("click", (event) => {
          event.stopPropagation();
          const h3Index = poly.dataset.h3 || "";
          if (state.pinnedH3 === h3Index) {
            clearPin();
            return;
          }
          pinCard(h3Index, event.clientX, event.clientY);
        });
      });
    }

    function updateMetadata(view) {
      if (!view) {
        clearPin();
        els.timeText.textContent = "-";
        els.centerText.textContent = "-";
        els.radiusText.textContent = "-";
        els.cellCountText.textContent = "0";
        els.supplyCurrentText.textContent = "-";
        els.supplyCapacityText.textContent = "-";
        els.supplyDailyText.textContent = "-";
        els.supplyDaysText.textContent = "-";
        return;
      }
      els.timeText.textContent = `Day ${view.time.day}, ${watchDisplayName(view.time.watch)}`;
      els.centerText.textContent = view.environs.center_h3;
      els.radiusText.textContent = String(view.environs.radius);
      els.cellCountText.textContent = String(view.environs.cells.length);
      const supply = view.army?.supply || {};
      els.supplyCurrentText.textContent = String(supply.current ?? "-");
      els.supplyCapacityText.textContent = String(supply.capacity ?? "-");
      els.supplyDailyText.textContent = String(supply.daily_consumption ?? "-");
      els.supplyDaysText.textContent = supply.days_estimate == null ? "-" : String(Math.floor(Number(supply.days_estimate)));
    }

    async function refreshView() {
      if (!state.token) {
        return;
      }
      const view = await api("/v1/me/view", {}, true);
      const cellsParam = encodeURIComponent(view.environs.cells.map((cell) => cell.h3).join(","));
      const borderRoads = await api(`/v1/me/roads/border?cells=${cellsParam}`, {}, true);
      state.view = view;
      state.borderRoadNeighbors = new Set((borderRoads.roads || []).map((value) => String(value)));
      state.pinnedH3 = null;
      updateMetadata(view);
      renderOrdersPanel();
      renderMap();
      setStatus(armyStatusText(view));
    }

    async function refreshAllPanels() {
      await refreshView();
      await refreshCorrespondents();
      await refreshInbox();
    }

    els.commanderSelect.addEventListener("change", async (event) => {
      const commanderName = event.target.value;
      if (!commanderName) {
        state.token = null;
        state.selectedCommander = null;
        state.view = null;
        state.correspondents = [];
        state.inbox = [];
        state.openMessageId = null;
        state.orderMode = "march";
        state.stagedPath = [];
        updateMetadata(null);
        renderMap();
        renderOrdersPanel();
        renderCorrespondents();
        renderInbox();
        els.composeBox.setAttribute("hidden", "");
        els.composeToggleBtn.textContent = "Send Letter";
        els.letterInput.value = "";
        els.messageRead.textContent = "Select a letter to read.";
        setStatus("");
        return;
      }
      try {
        await loginCommander(commanderName);
        state.orderMode = "march";
        state.stagedPath = [];
        await refreshAllPanels();
      } catch (err) {
        setStatus(`Login/load error: ${err.message}`, true);
      }
    });

    const resizeObserver = new ResizeObserver(() => {
      const rect = els.mapPanel.getBoundingClientRect();
      state.mapWidth = Math.max(600, Math.floor(rect.width - 2));
      state.mapHeight = Math.max(420, Math.floor(rect.height - 2));
      renderMap();
    });
    resizeObserver.observe(els.mapPanel);

    setInterval(async () => {
      if (!state.token) {
        return;
      }
      try {
        await refreshAllPanels();
      } catch (err) {
        setStatus(`Auto-refresh error: ${err.message}`, true);
      }
    }, 10000);

    (async function init() {
      renderLegend();
      renderOrdersPanel();
      els.queueMoveBtn.addEventListener("click", async () => {
        if (!state.token) {
          setStatus("Select a commander first.", true);
          return;
        }
        if (!state.hoverH3) {
          setStatus("No cell selected.", true);
          return;
        }
        const check = canStageMove(state.hoverH3);
        if (!check.ok) {
          setStatus(check.reason, true);
          return;
        }
        state.stagedPath.push(state.hoverH3);
        renderStagedPathList();
        renderMap();
        setStatus(`Staged step ${state.stagedPath.length}: ${state.hoverH3}`);
      });
      els.orderModeSelect.addEventListener("change", () => {
        const nextMode = String(els.orderModeSelect.value || "march").trim().toLowerCase();
        if (nextMode === "forage" && !isNightWatch()) {
          state.orderMode = "march";
          renderOrdersPanel();
          setStatus("Forage can only be planned during Night Watch.", true);
          return;
        }
        state.orderMode = nextMode === "forage" ? "forage" : "march";
        if (state.orderMode === "forage") {
          state.stagedPath = [];
          renderMap();
        }
        renderOrdersPanel();
      });
      els.submitOrdersBtn.addEventListener("click", async () => {
        if (!state.token) {
          setStatus("Select a commander first.", true);
          return;
        }
        try {
          let payload;
          if (state.orderMode === "forage") {
            if (!isNightWatch()) {
              setStatus("Forage can only be submitted during Night Watch.", true);
              return;
            }
            payload = { kind: "forage", path: [] };
          } else {
            if (!state.stagedPath.length) {
              setStatus("Stage at least one destination for march orders.", true);
              return;
            }
            payload = { kind: "march", path: state.stagedPath.slice() };
          }
          const result = await api(
            "/v1/me/actions/plan",
            {
              method: "POST",
              body: JSON.stringify(payload),
            },
            true
          );
          state.stagedPath = [];
          renderOrdersPanel();
          await refreshView();
          setStatus(`Orders submitted. Replaced ${result.cancelled_queued_count} queued action(s).`);
        } catch (err) {
          setStatus(`Order submit failed: ${err.message}`, true);
        }
      });
      els.composeToggleBtn.addEventListener("click", () => {
        const isHidden = els.composeBox.hasAttribute("hidden");
        if (isHidden) {
          els.composeBox.removeAttribute("hidden");
          els.composeToggleBtn.textContent = "Hide Composer";
        } else {
          els.composeBox.setAttribute("hidden", "");
          els.composeToggleBtn.textContent = "Send Letter";
        }
      });
      els.sendLetterBtn.addEventListener("click", async () => {
        if (!state.token) {
          setStatus("Select a commander first.", true);
          return;
        }
        const recipientId = els.recipientSelect.value;
        const content = els.letterInput.value.trim();
        if (!recipientId) {
          setStatus("Select a recipient.", true);
          return;
        }
        if (!content) {
          setStatus("Write a message before sending.", true);
          return;
        }
        try {
          await api(
            "/v1/me/messages",
            {
              method: "POST",
              body: JSON.stringify({ recipient_id: recipientId, content, priority: "normal" }),
            },
            true
          );
          els.letterInput.value = "";
          setStatus(`Letter sent to ${recipientId}.`);
          await refreshInbox();
        } catch (err) {
          setStatus(`Send failed: ${err.message}`, true);
        }
      });
      els.mapCanvas.addEventListener("mouseleave", () => {
        if (!state.pinnedH3) {
          hideHoverCard();
        }
      });
      els.mapCanvas.addEventListener("click", () => {
        if (state.pinnedH3) {
          clearPin();
          setStatus("Unpinned cell.");
        }
      });
      els.hoverCard.addEventListener("click", (event) => event.stopPropagation());
      try {
        await loadCommanders();
        renderCorrespondents();
        renderInbox();
        const rect = els.mapPanel.getBoundingClientRect();
        state.mapWidth = Math.max(600, Math.floor(rect.width - 2));
        state.mapHeight = Math.max(420, Math.floor(rect.height - 2));
      } catch (err) {
        setStatus(`Init error: ${err.message}`, true);
      }
    })();
  </script>
</body>
</html>
